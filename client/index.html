<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Buddy Garden</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen:wght@400;700&family=Pixelify+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      button, input, select, textarea {
        font-family: inherit;
      }

      :root { --app-font: 'Silkscreen', sans-serif; }

      body {
        background: #1a1a2e;
        color: #eee;
        font-family: var(--app-font, sans-serif);
        overflow: hidden;
        width: 100%;
        height: 100dvh;
        /* Fallback para browsers sem suporte a dvh */
        height: -webkit-fill-available;
      }

      #root {
        width: 100%;
        height: 100%;
        /* Safe area insets para notch/home bar */
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Previne scroll bounce no iOS */
      html {
        height: -webkit-fill-available;
        overflow: hidden;
      }

      /* Aumenta áreas de toque mínimas */
      button, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      input, textarea {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* ── Scrollbars ─────────────────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a18;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2a5a;
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4a4a8a;
      }
      ::-webkit-scrollbar-corner {
        background: #0a0a18;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #2a2a5a #0a0a18;
      }

      /* ── Animações globais ──────────────────────────────────────────────── */
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.90); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
    </style>

    <!-- Aplica fonte salva do localStorage antes do React montar (evita flash) -->
    <script>
      try {
        var f = localStorage.getItem('buddyChatFont');
        if (f) document.documentElement.style.setProperty('--app-font', f);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
